name: Convert PDFs to Text
on: workflow_dispatch

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install PyPDF2
        run: pip install PyPDF2

      - name: Create and run script
        run: |
          cat << 'EOF' > convert.py
          import os, PyPDF2
          output_file = "master_scada_project.txt"
          pdf_files = [f for f in os.listdir('.') if f.endswith('.pdf')]
          pdf_files.sort()
          with open(output_file, 'w', encoding='utf-8') as outfile:
              for pdf in pdf_files:
                  outfile.write(f"\n\n--- START OF {pdf} ---\n\n")
                  try:
                      reader = PyPDF2.PdfReader(pdf)
                      for page in reader.pages:
                          text = page.extract_text()
                          if text: outfile.write(text + "\n")
                  except Exception as e: print(f"Error: {e}")
          EOF
          python convert.py

      - name: Upload Master Text File
        uses: actions/upload-artifact@v4
        with:
          name: Master-SCADA-Text
          path: master_scada_project.txt
